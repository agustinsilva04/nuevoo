name: Python CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pytest flake8 black

      - name: Ejecutar tests
        run: pytest -v
        env:
          PYTHONPATH: .

      - name: Ejecutar flake8
        run: flake8 .

      - name: Verificar formato con black
        run: black --check .